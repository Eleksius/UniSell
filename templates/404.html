{% extends 'base.html' %}

{% block content %}
<div class="container text-center py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 my-5">
            <h1 class="display-1 fw-bold text-primary">404</h1>
            <h2 class="mb-3">Страница не найдена 🔍</h2>
            <p class="text-muted mb-4">
                Похоже, этого объявления больше не существует, или ссылка была введена неверно.
                Давайте вернемся на главную, чтобы найти что-нибудь полезное!
            </p>
            <a href="{{ url_for('index') }}" class="btn btn-primary rounded-pill px-4 py-2">На главную</a>
        </div>
    </div>
</div>
{% endblock %}
